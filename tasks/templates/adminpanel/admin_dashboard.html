<!-- Bootstrap CSS -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


{% block content %}

<h2 class="mb-4">Admin Dashboard</h2>

<div class="row">

<div class="col-md-4">

<div class="card text-center bg-primary text-white">

<div class="card-body">

<h5>Total Users</h5>

<h2>{{users}}</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-center bg-success text-white">

<div class="card-body">

<h5>Total Tasks</h5>

<h2>{{tasks}}</h2>

</div>

</div>

</div>

</div>

<br>

<a href="/admin-users/" class="btn btn-info">View Users</a>

<a href="/admin-tasks/" class="btn btn-warning">View Tasks</a>

<a href="/logout/" class="btn btn-danger">Logout</a>

{% endblock %}
